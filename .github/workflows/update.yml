name: Aggiorna Dashboard AIFA

on:
  # Esegui ogni lunedì alle 06:00 UTC
  schedule:
    - cron: '0 6 * * 1'
  # Permetti anche esecuzione manuale dal sito GitHub
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Esegui script di build
        run: python build_dashboard.py

      - name: Commit e pubblica dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "Dashboard aggiornata $(date +'%d/%m/%Y')"
          git push
